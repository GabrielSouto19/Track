  <body>
    <h1>Teste Meta Pixel + API de Conversões</h1>

    <form id="leadForm">
      <input type="text" id="name" placeholder="Nome" required />

      <input type="email" id="email" placeholder="Email" required />

      <input type="tel" id="phone" placeholder="Telefone" required />

      <button type="submit">Enviar Lead</button>
    </form>

    <br />

    <a
      class="whatsapp"
      href="https://wa.me/5531999999999"
      target="_blank"
      onclick="trackWhatsapp()"
    >
      Falar no WhatsApp
    </a>

    <script>
      async function trackWhatsapp() {
        const eventId = crypto.randomUUID();

        fbq(
          "track",
          "Contact",
          {},
          {
            eventID: eventId,
          },
        );

        await fetch("http://localhost:8000/contact", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            event_id: eventId,
          }),
        });
      }

      document
        .getElementById("leadForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          const eventId = crypto.randomUUID();

          const name = document.getElementById("name").value;

          const email = document.getElementById("email").value;

          const phone = document.getElementById("phone").value;

          fbq(
            "track",
            "Lead",
            {
              content_name: "Formulario Principal",
            },
            {
              eventID: eventId,
            },
          );

          await fetch("http://localhost:8000/lead", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              name: name,
              email: email,
              phone: phone,
              event_id: eventId,
            }),
          });

          alert("Lead enviado!");
        });
    </script>
  </body>
