    <style>
        body{
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
        }

        button{
            display:block;
            width:100%;
            margin:15px 0;
            padding:15px;
            font-size:18px;
            cursor:pointer;
        }

        form{
            margin-top:30px;
        }

        input{
            width:100%;
            padding:10px;
            margin:10px 0;
        }
    </style>
</head>
<body>

    <h1>Teste de Eventos Meta Pixel</h1>

    <!-- VIEW CONTENT -->
    <button onclick="trackViewContent()">
        Ver Produto
    </button>

    <!-- WHATSAPP -->
    <button onclick="trackWhatsapp()">
        Falar no WhatsApp
    </button>

    <!-- CHECKOUT -->
    <button onclick="trackCheckout()">
        Solicitar Orçamento
    </button>

    <!-- PURCHASE -->
    <button onclick="trackPurchase()">
        Simular Compra
    </button>

    <!-- COMPLETE REGISTRATION -->
    <button onclick="trackRegistration()">
        Cadastro Completo
    </button>

    <!-- FORMULÁRIO -->
    <form id="leadForm">
        <h2>Formulário de Lead</h2>

        <input
            type="text"
            placeholder="Seu Nome"
            required
        >

        <input
            type="email"
            placeholder="Seu E-mail"
            required
        >

        <button type="submit">
            Enviar Formulário
        </button>
    </form>

    <script>

        function trackViewContent() {

            fbq('track', 'ViewContent');

            alert('Evento ViewContent enviado');

        }

        function trackWhatsapp() {

            fbq('track', 'Contact');

            window.open(
                'https://wa.me/5531999999999',
                '_blank'
            );

        }

        function trackCheckout() {

            fbq('track', 'InitiateCheckout');

            alert('Evento InitiateCheckout enviado');

        }

        function trackPurchase() {

            fbq('track', 'Purchase', {
                value: 1500,
                currency: 'BRL'
            });

            alert('Evento Purchase enviado');

        }

        function trackRegistration() {

            fbq('track', 'CompleteRegistration');

            alert('Evento CompleteRegistration enviado');

        }

        document
            .getElementById('leadForm')
            .addEventListener('submit', function(e){

                e.preventDefault();

                fbq('track', 'Lead');

                alert('Evento Lead enviado');

            });

    </script>

</body>
</html>
